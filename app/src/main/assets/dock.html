<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Glass Bottom Navigation</title>
  <style>
    :root {
      /* 主题色 — 与记账 app 的绿色一致 */
      --accent: #04b285;
      /* 底座磨砂玻璃参数 (对应 nav_style: pillBlurSigma=26, pillFilmStart=0.42, pillFilmEnd=0.26) */
      --bar-blur: 26px;
      --bar-saturate: 1.6;
      --bar-film-start: 0.42;
      --bar-film-end: 0.26;
      --bar-frost: 0.09;
      --bar-radius: 26px;
      /* 选中胶囊参数 (对应 nav_style: selectedStartOpacity=0.50, selectedEndOpacity=0.30) */
      --pill-blur: 26px;
      --pill-start-opacity: 0.50;
      --pill-end-opacity: 0.30;
      --pill-frost: 0.16;
      --pill-radial-opacity: 0.14;
      --pill-radius: 22px;
      /* 布局参数 */
      --bar-width-factor: 0.86;
      --bar-height: 60px;
      --edge-padding: 16px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
    }

    /* ===== 底部导航栏容器 ===== */
    .glass-nav-container {
      position: fixed;
      bottom: var(--edge-padding);
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      pointer-events: none;
    }

    /* ===== 磨砂玻璃底座 (FrostedPill) ===== */
    .glass-bar {
      position: relative;
      width: calc(100vw * var(--bar-width-factor));
      height: var(--bar-height);
      border-radius: var(--bar-radius);
      pointer-events: auto;
      overflow: hidden;
      /* 薄膜渐变 — 白色半透明，模拟玻璃材质 */
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, var(--bar-film-start)) 0%,
        rgba(255, 255, 255, var(--bar-film-end)) 100%
      );
      /* 磨砂模糊 + 饱和度增强 — 模拟 Liquid Glass 的色彩放大 */
      -webkit-backdrop-filter: blur(var(--bar-blur)) saturate(var(--bar-saturate));
      backdrop-filter: blur(var(--bar-blur)) saturate(var(--bar-saturate));
      /* 边缘高光 */
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.5),
        inset 0 -1px 1px rgba(255, 255, 255, 0.15),
        0 8px 32px rgba(0, 0, 0, 0.12),
        0 2px 8px rgba(0, 0, 0, 0.08);
      transform: translateZ(0);
    }

    /* 霜化覆盖层 */
    .glass-bar::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, var(--bar-frost));
      pointer-events: none;
      z-index: 1;
    }

    /* 顶部高光线 */
    .glass-bar::after {
      content: "";
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      pointer-events: none;
      z-index: 2;
    }

    /* ===== 选中胶囊 (Selected Pill) ===== */
    .selected-pill {
      position: absolute;
      top: 4px;
      bottom: 4px;
      border-radius: var(--pill-radius);
      pointer-events: none;
      z-index: 3;
      overflow: hidden;
      /* 渐变背景 */
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, var(--pill-start-opacity)) 0%,
        rgba(255, 255, 255, var(--pill-end-opacity)) 100%
      );
      /* 独立模糊层 */
      -webkit-backdrop-filter: blur(var(--pill-blur)) saturate(var(--bar-saturate));
      backdrop-filter: blur(var(--pill-blur)) saturate(var(--bar-saturate));
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.6),
        inset 0 -1px 2px rgba(255, 255, 255, 0.2),
        0 2px 8px rgba(0, 0, 0, 0.06);
      /* 弹性动画 — 340ms 对应 nav_style 的 AnimationController duration */
      transition: left 340ms cubic-bezier(0.25, 1, 0.5, 1),
                  width 340ms cubic-bezier(0.25, 1, 0.5, 1);
      transform: translateZ(0);
    }

    /* 胶囊霜化层 */
    .selected-pill::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, var(--pill-frost));
      pointer-events: none;
    }

    /* 胶囊径向高光 (对应 selectedRadialOpacity=0.14) */
    .selected-pill::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 90% 90% at 49% 20%,
        rgba(255, 255, 255, var(--pill-radial-opacity)) 0%,
        transparent 70%
      );
      pointer-events: none;
    }

    /* ===== 导航项 ===== */
    .nav-items {
      position: relative;
      display: flex;
      width: 100%;
      height: 100%;
      z-index: 4;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 200ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-item:active {
      transform: scale(0.92);
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
      transition: color 200ms ease, transform 200ms ease;
      color: #888;
    }

    .nav-item span {
      font-size: 10px;
      font-weight: 600;
      color: #999;
      transition: color 200ms ease;
      letter-spacing: 0.3px;
    }

    /* 选中状态 — 图标和文字变为主题色 */
    .nav-item.active svg {
      color: var(--accent);
      transform: scale(1.1);
    }

    .nav-item.active span {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="glass-nav-container">
    <div class="glass-bar" id="glass-bar">
      <!-- 选中胶囊 -->
      <div class="selected-pill" id="selected-pill"></div>
      <!-- 导航项 -->
      <div class="nav-items" id="nav-items">
        <div class="nav-item active" data-index="0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span>首页</span>
        </div>
        <div class="nav-item" data-index="1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span>记一笔</span>
        </div>
        <div class="nav-item" data-index="2">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
          </svg>
          <span>统计</span>
        </div>
        <div class="nav-item" data-index="3">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          <span>设置</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    var items = document.querySelectorAll('.nav-item');
    var pill = document.getElementById('selected-pill');
    var currentIndex = 0;

    // 计算并设置选中胶囊位置
    function updatePill(index) {
      var item = items[index];
      if (!item) return;
      var rect = item.getBoundingClientRect();
      var barRect = document.getElementById('glass-bar').getBoundingClientRect();
      pill.style.left = (rect.left - barRect.left + 4) + 'px';
      pill.style.width = (rect.width - 8) + 'px';
    }

    // 切换选中项
    function selectIndex(index) {
      if (index < 0 || index >= items.length) return;
      currentIndex = index;
      items.forEach(function(item, i) {
        if (i === index) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
      updatePill(index);
      notifyAndroid(index);
    }

    // Android JS 桥梁
    function notifyAndroid(idx) {
      if (window.AndroidDock && window.AndroidDock.onDockItemSelected) {
        window.AndroidDock.onDockItemSelected(idx);
      }
    }

    // Android → JS 同步选中项（不触发回调）
    window.setDockIndex = function(idx) {
      if (idx < 0 || idx >= items.length) return;
      if (idx === currentIndex) return;
      currentIndex = idx;
      items.forEach(function(item, i) {
        if (i === idx) item.classList.add('active');
        else item.classList.remove('active');
      });
      updatePill(idx);
    };

    // 绑定点击事件
    items.forEach(function(item, i) {
      item.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        selectIndex(i);
      });
      // touchend 优先处理移动端点击
      item.addEventListener('touchend', function(e) {
        e.preventDefault();
        e.stopPropagation();
        selectIndex(i);
      });
    });

    // 页面加载完成后初始化胶囊位置
    window.addEventListener('load', function() {
      setTimeout(function() { updatePill(currentIndex); }, 50);
    });

    // 窗口尺寸变化时重新计算
    window.addEventListener('resize', function() {
      updatePill(currentIndex);
    });
  </script>
</body>
</html>
