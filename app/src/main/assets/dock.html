<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Liquid Glass Dock</title>
  <style>
    :root {
      --bg-color: transparent;
      --fg-color: #000000;
      --theme-color: rgb(4, 178, 133);
      --dock-bg-rgb: 255, 255, 255;
      --slider-tint-rgb: 0, 0, 0;
      --inner-shadow-color: #ffffff;
      --inner-shadow-blur: 20px;
      --inner-shadow-spread: -5px;
      --outer-shadow-blur: 24px;
      --clipL: 4px;
      --clipW: 79px;
      --clipT: 3.5px;
      --clipH: 48px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; color: var(--fg-color); background: transparent; }
    .bottom-controls { position: fixed; left: calc(50% - 162px); bottom: 0; z-index: 1000; pointer-events: none; }
    .dock-wrapper { width: 324px; height: 55px; pointer-events: auto; }
    .dock-container { width: 100%; height: 100%; position: relative; transform-origin: center center; pointer-events: auto; --innerGlowOp: 0; --edgeGlowOp: 0; --glowRadius: 1; touch-action: none; }
    .dock-shadow-layer { position: absolute; top: 2px; bottom: 2px; left: 8px; right: 8px; z-index: 0; pointer-events: none; border-radius: 25px; box-shadow: 0 16px 32px 2px rgba(0,0,0,0.15), 0 4px 12px 1px rgba(0,0,0,0.08); }
    .dock-base { position: absolute; inset: 0; z-index: 1; overflow: hidden; padding: 4px; background: rgba(var(--dock-bg-rgb), 0.23); transform: translateZ(0); -webkit-backdrop-filter: blur(20px) saturate(1.5); backdrop-filter: blur(20px) saturate(1.5); border-radius: 27.5px; }
    .glow-layer { position: absolute; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; background: radial-gradient(calc(100px * var(--glowRadius)) circle at var(--innerX, -999px) var(--innerY, -999px), rgba(255,255,255,calc(0.5 * var(--innerGlowOp))) 0%, rgba(255,255,255,calc(0.1 * var(--innerGlowOp))) 50%, transparent 80%); border-radius: 27.5px; }
    .dock-base::after { content: ""; position: absolute; inset: 0; z-index: 10; pointer-events: none; background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 50%), linear-gradient(-35deg, rgba(255,255,255,0.4) 0%, transparent 50%); mix-blend-mode: plus-lighter; border-radius: 27.5px; }
    .ripple-layer { position: absolute; inset: 0; z-index: 2; overflow: hidden; pointer-events: none; border-radius: 27.5px; }
    .ripple-wave { position: absolute; width: 120px; height: 120px; border-radius: 50%; pointer-events: none; opacity: 1; background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 60%); transform: translate(-50%, -50%) scale(0); animation: ripple-anim 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
    @keyframes ripple-anim { to { opacity: 0; transform: translate(-50%, -50%) scale(2.2); } }
    .dock-items-wrap, .dock-active-layer { position: absolute; inset: 0; z-index: 998; }
    .dock-items-wrap { color: var(--fg-color); touch-action: none; }
    .dock-item { position: absolute; top: 3.5px; width: 81.5px; height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: inherit; cursor: pointer; z-index: 3; transform-origin: center center; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
    .dock-item:nth-child(1) { left: 3px; }
    .dock-item:nth-child(2) { left: 83px; }
    .dock-item:nth-child(3) { left: 162px; }
    .dock-item:nth-child(4) { left: 242px; }
    .dock-item svg { width: 25px; height: 25px; }
    .dock-item span { margin-top: 4px; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
    .dock-active-layer { color: var(--theme-color); opacity: 1; pointer-events: none; }
    .dock-container.expanding .dock-active-layer .dock-item { transform: scale(1.1); }
    #frosted-slider { position: absolute; top: 3.5px; left: 4px; width: 79px; height: 48px; z-index: 999; overflow: hidden; opacity: 1; pointer-events: auto; touch-action: none; background-color: rgba(var(--slider-tint-rgb), 0.15); box-shadow: 0 2px 8px rgba(0,0,0,0.06); transform: translateZ(0); border-radius: 24px; -webkit-backdrop-filter: blur(12px) saturate(1.4); backdrop-filter: blur(12px) saturate(1.4); transition: background-color 0.4s ease, box-shadow 0.4s ease; }
    #frosted-slider.expanding { background-color: rgba(var(--slider-tint-rgb), 0.06); box-shadow: inset 0 0 var(--inner-shadow-blur) var(--inner-shadow-spread) var(--inner-shadow-color), 0 2px var(--outer-shadow-blur) rgba(0,0,0,0.2); }
    #frosted-slider::after { content: ""; position: absolute; inset: 0; z-index: 9999; pointer-events: none; opacity: 0; background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, transparent 50%), linear-gradient(-35deg, rgba(255,255,255,0.9) 0%, transparent 50%); mix-blend-mode: plus-lighter; border-radius: 24px; transition: opacity 0.4s ease; }
    #frosted-slider.expanding::after { opacity: 1; }
  </style>
</head>
<body>
  <nav class="bottom-controls" aria-label="底部状态栏">
    <div class="dock-wrapper" id="dock-wrapper">
      <div class="dock-container" id="dock-root">
        <div class="dock-shadow-layer"></div>
        <div class="dock-base"><div class="glow-layer"></div></div>
        <div class="ripple-layer"></div>
        <div class="dock-items-wrap">
          <div class="dock-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M 3 9 v -1 a 2 2 0 0 1 2 -2 h 14 a 2 2 0 0 1 2 2 v 1 z"></path><path d="M 3 11 v 5 a 2 2 0 0 0 2 2 h 14 a 2 2 0 0 0 2 -2 v -5 z"></path></svg><span>首页</span>
          </div>
          <div class="dock-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M 10.5 10 C 10.5 4, 3 5, 6.5 10 Z"></path><path d="M 13.5 10 C 13.5 4, 21 5, 17.5 10 Z"></path><rect x="4" y="10" width="6.5" height="3" rx="0.5"></rect><rect x="13.5" y="10" width="6.5" height="3" rx="0.5"></rect><path d="M 5 13 h 5.5 v 6.5 a 0.5 0.5 0 0 1 -0.5 0.5 h -4.5 a 0.5 0.5 0 0 1 -0.5 -0.5 z"></path><path d="M 13.5 13 h 5.5 v 6.5 a 0.5 0.5 0 0 1 -0.5 0.5 h -4.5 a 0.5 0.5 0 0 1 -0.5 -0.5 z"></path></svg><span>记一笔</span>
          </div>
          <div class="dock-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M 5 9 h 14 v 9 a 2 2 0 0 1 -2 2 h -10 a 2 2 0 0 1 -2 -2 z"></path><path d="M 8 9 v -3 a 4 4 0 0 1 8 0 v 3"></path></svg><span>统计</span>
          </div>
          <div class="dock-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>设置</span>
          </div>
        </div>
        <div id="frosted-slider"></div>
        <div class="dock-active-layer" id="active-mask">
          <div class="dock-item"><svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M 3 9 v -1 a 2 2 0 0 1 2 -2 h 14 a 2 2 0 0 1 2 2 v 1 z"></path><path d="M 3 11 v 5 a 2 2 0 0 0 2 2 h 14 a 2 2 0 0 0 2 -2 v -5 z"></path></svg><span>首页</span></div>
          <div class="dock-item"><svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M 10.5 10 C 10.5 4, 3 5, 6.5 10 Z"></path><path d="M 13.5 10 C 13.5 4, 21 5, 17.5 10 Z"></path><rect x="4" y="10" width="6.5" height="3" rx="0.5"></rect><rect x="13.5" y="10" width="6.5" height="3" rx="0.5"></rect><path d="M 5 13 h 5.5 v 6.5 a 0.5 0.5 0 0 1 -0.5 0.5 h -4.5 a 0.5 0.5 0 0 1 -0.5 -0.5 z"></path><path d="M 13.5 13 h 5.5 v 6.5 a 0.5 0.5 0 0 1 -0.5 0.5 h -4.5 a 0.5 0.5 0 0 1 -0.5 -0.5 z"></path></svg><span>记一笔</span></div>
          <div class="dock-item"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path fill="currentColor" d="M 5 9 h 14 v 9 a 2 2 0 0 1 -2 2 h -10 a 2 2 0 0 1 -2 -2 z"></path><path fill="none" d="M 8 9 v -3 a 4 4 0 0 1 8 0 v 3"></path></svg><span>统计</span></div>
          <div class="dock-item"><svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>设置</span></div>
        </div>
      </div>
    </div>
  </nav>
  <script>
    const TARGET_POSITIONS = [4, 83, 162, 241];
    const THEME_COLORS = ["rgb(4,178,133)", "rgb(255,55,95)", "rgb(10,132,255)", "rgb(255,159,10)"];
    const clamp = (val, min, max) => Math.max(min, Math.min(max, val));
    const rubberBand = (distance, limit) => (distance * 0.05 * limit) / (Math.abs(distance * 0.05) + limit);
    const SOFT_K = 0.045, SOFT_D = 0.84, JELLY_K = 0.01, JELLY_D = 0.95;

    const dockRoot = document.getElementById("dock-root");
    const slider = document.getElementById("frosted-slider");
    let currentActiveIndex = 0, dockPressed = false, isDragging = false, isExpanding = false;
    let isAutoAnimating = false, isSnapping = false;
    let targetX = TARGET_POSITIONS[0], currentX = TARGET_POSITIONS[0], lastX = TARGET_POSITIONS[0];
    let vel = 0, touchOffsetX = 0, sliderHasMoved = false, wasDragging = false;
    let pointerStartXSlider = 0, pointerStartYSlider = 0;
    let dockTargetShiftX = 0, dockCurrentShiftX = 0, dockTargetShiftY = 0, dockCurrentShiftY = 0;
    let dockPressStartX = 0, dockPressStartY = 0;
    let dockBaseScale = 1, sliderBaseScale = 1, sliderScaleVel = 0;
    let currentSX = 1, currentSY = 1, sxVel = 0, syVel = 0;
    let lastTime = performance.now();

    function setExpanding(val) { isExpanding = val; slider.classList.toggle("expanding", val); dockRoot.classList.toggle("expanding", val); }
    function setActiveIndex(idx) { currentActiveIndex = idx; document.documentElement.style.setProperty("--theme-color", THEME_COLORS[idx]); }

    // Android 桥接
    function notifyAndroid(idx) {
      if (window.AndroidDock && window.AndroidDock.onDockItemSelected) {
        window.AndroidDock.onDockItemSelected(idx);
      }
    }
    // Android 调用: 设置选中项
    window.setDockIndex = function(idx) {
      if (idx < 0 || idx > 3) return;
      if (Math.abs(targetX - TARGET_POSITIONS[idx]) < 1 && currentActiveIndex === idx) return;
      isSnapping = false; isAutoAnimating = false; isDragging = false;
      targetX = TARGET_POSITIONS[idx];
      currentX = TARGET_POSITIONS[idx];
      setActiveIndex(idx);
      slider.style.left = currentX + "px";
    };

    function physLoop(time) {
      let dt = time - lastTime; lastTime = time; if (dt > 50) dt = 16.66;
      const dist = Math.abs(targetX - currentX);
      const lerpFactor = isAutoAnimating ? 0.13 : (isDragging ? 0.25 : 0.08);
      currentX += (targetX - currentX) * lerpFactor;
      if (Math.abs(targetX - currentX) < 0.01) currentX = targetX;
      slider.style.left = currentX + "px";
      vel = currentX - lastX; lastX = currentX;

      let targetSX = 1, targetSY = 1;
      const absVel = Math.abs(vel);
      const majorDeform = Math.min(absVel * 0.04, 0.15), minorDeform = Math.min(absVel * 0.04, 0.08);
      if (vel < -0.5) { targetSX = 1 - majorDeform; targetSY = 1 + minorDeform; }
      else if (vel > 0.5) { targetSX = 1 + minorDeform; targetSY = 1 - majorDeform; }
      sxVel += (targetSX - currentSX) * JELLY_K; syVel += (targetSY - currentSY) * JELLY_K;
      sxVel *= JELLY_D; syVel *= JELLY_D; currentSX += sxVel; currentSY += syVel;
      if (absVel < 0.1 && Math.abs(currentSX - 1) < 0.005 && Math.abs(sxVel) < 0.005) { currentSX = 1; sxVel = 0; }
      if (absVel < 0.1 && Math.abs(currentSY - 1) < 0.005 && Math.abs(syVel) < 0.005) { currentSY = 1; syVel = 0; }

      const targetSliderScale = isExpanding ? 1.35 : 1;
      sliderScaleVel += (targetSliderScale - sliderBaseScale) * SOFT_K; sliderScaleVel *= SOFT_D; sliderBaseScale += sliderScaleVel;
      if (Math.abs(sliderBaseScale - targetSliderScale) < 0.002 && Math.abs(sliderScaleVel) < 0.002) { sliderBaseScale = targetSliderScale; sliderScaleVel = 0; }
      slider.style.transform = "scale(" + currentSX * sliderBaseScale + ", " + currentSY * sliderBaseScale + ") translateZ(0)";

      if (isAutoAnimating || isSnapping) {
        if (isExpanding && ((isAutoAnimating && dist <= 8) || (isSnapping && dist <= 10))) setExpanding(false);
        if (isExpanding) { dockTargetShiftX = rubberBand(currentX - targetX, 4); dockTargetShiftY = 0; }
        else if (!dockPressed) { dockTargetShiftX = 0; }
        if (dist < 0.01 && absVel < 0.01 && !isExpanding) { isAutoAnimating = false; isSnapping = false; }
      }
      const targetDockScale = isExpanding ? 1.05 : 1;
      dockBaseScale += (targetDockScale - dockBaseScale) * ((isAutoAnimating || isSnapping) ? 0.08 : 0.15);
      if (Math.abs(dockBaseScale - targetDockScale) < 0.001) dockBaseScale = targetDockScale;
      dockCurrentShiftX += (dockTargetShiftX - dockCurrentShiftX) * 0.15; dockCurrentShiftY += (dockTargetShiftY - dockCurrentShiftY) * 0.15;
      if (Math.abs(dockCurrentShiftX - dockTargetShiftX) < 0.01) dockCurrentShiftX = dockTargetShiftX;
      if (Math.abs(dockCurrentShiftY - dockTargetShiftY) < 0.01) dockCurrentShiftY = dockTargetShiftY;
      dockRoot.style.transform = "translate(" + dockCurrentShiftX + "px, " + dockCurrentShiftY + "px) scale(" + dockBaseScale + ")";
      requestAnimationFrame(physLoop);
    }
    requestAnimationFrame(physLoop);

    window.addEventListener("pointermove", (e) => {
      if (isDragging && !isAutoAnimating && !isSnapping) {
        if (Math.abs(e.clientX - pointerStartXSlider) > 5) sliderHasMoved = true;
        const dx = e.clientX - pointerStartXSlider;
        targetX = clamp(touchOffsetX + dx, TARGET_POSITIONS[0], TARGET_POSITIONS[3]);
        dockTargetShiftX = rubberBand(dx, 4); dockTargetShiftY = rubberBand(e.clientY - pointerStartYSlider, 4);
      } else if (dockPressed && !isDragging) {
        dockTargetShiftX = rubberBand(e.clientX - dockPressStartX, 4); dockTargetShiftY = rubberBand(e.clientY - dockPressStartY, 4);
      }
    });

    function handleGlobalUp() {
      if (dockPressed) { dockPressed = false; if (!isDragging) { dockTargetShiftX = 0; dockTargetShiftY = 0; } }
      if (isDragging && !isAutoAnimating) {
        isDragging = false; dockTargetShiftX = 0; dockTargetShiftY = 0;
        if (sliderHasMoved) { wasDragging = true; setTimeout(() => { wasDragging = false; }, 50); }
        const inertia = Math.max(-80, Math.min(80, vel * 6));
        const centerPos = currentX + inertia + 39.5;
        const idx = centerPos < 83 ? 0 : centerPos < 162 ? 1 : centerPos < 241 ? 2 : 3;
        targetX = TARGET_POSITIONS[idx]; isSnapping = true; setActiveIndex(idx);
        if (sliderHasMoved) notifyAndroid(idx);
        if (!sliderHasMoved) setExpanding(false);
      }
    }
    window.addEventListener("pointerup", handleGlobalUp);
    window.addEventListener("pointercancel", handleGlobalUp);
    window.addEventListener("touchend", handleGlobalUp);
    window.addEventListener("touchcancel", handleGlobalUp);

    dockRoot.addEventListener("pointerdown", (e) => {
      dockPressed = true; dockPressStartX = e.clientX; dockPressStartY = e.clientY;
      const rect = dockRoot.getBoundingClientRect();
      const relativeX = e.clientX - rect.left;
      if (relativeX >= currentX - 5 && relativeX <= currentX + 84) {
        isAutoAnimating = false; isSnapping = false; sliderHasMoved = false;
        pointerStartXSlider = e.clientX; pointerStartYSlider = e.clientY;
        dockTargetShiftX = 0; dockTargetShiftY = 0; isDragging = true; setExpanding(true); touchOffsetX = currentX;
      }
    });

    document.querySelectorAll(".dock-items-wrap .dock-item").forEach((item, i) => {
      item.addEventListener("touchend", (e) => {
        if (sliderHasMoved || wasDragging) { e.preventDefault(); return; }
        e.preventDefault(); e.stopPropagation();
        isSnapping = false; isAutoAnimating = false; isDragging = false;
        targetX = TARGET_POSITIONS[i]; isAutoAnimating = true;
        setExpanding(true); setActiveIndex(i);
        notifyAndroid(i);
      });
      item.addEventListener("click", (e) => {
        if (sliderHasMoved || wasDragging || isDragging) { e.preventDefault(); return; }
        if (Math.abs(targetX - TARGET_POSITIONS[i]) < 1) return;
        e.preventDefault(); e.stopPropagation();
        isSnapping = false; targetX = TARGET_POSITIONS[i]; isAutoAnimating = true;
        setExpanding(true); setActiveIndex(i);
        notifyAndroid(i);
      });
    });
  </script>
</body>
</html>
